services:
  - type: web
    name: plately-webapp
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
